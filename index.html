<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root { --navy: #1a2a3a; --wine: #8e2121; --bg: #f8f9fa; --light-gray: #999; --text: #333; }
* { box-sizing: border-box; font-family: 'Inter', sans-serif; outline: none; }
body { background: var(--bg); margin: 0; color: var(--text); -webkit-font-smoothing: antialiased; }
.header { padding: 30px 20px; background: var(--navy); color: white; text-align: center; border-radius: 0 0 25px 25px; }
.title { font-family: 'Playfair Display', serif; font-size: 26px; letter-spacing: 1px; }

.tabs { display: flex; margin: -20px 25px 15px; background: white; padding: 5px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); position: relative; z-index: 10; }
.tab { flex: 1; text-align: center; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 600; color: var(--light-gray); cursor: pointer; }
.tab.active { background: var(--navy); color: white; }

.date-header { background: white; padding: 15px 20px; margin: 10px 15px; border-radius: 12px; font-weight: 700; color: var(--navy); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; }
.date-header::after { content: '▼'; font-size: 10px; color: #ccc; }
.date-content { display: none; }
.date-content.open { display: block; }

.card { background: white; border-radius: 15px; padding: 18px; margin: 10px 15px; border: 1px solid #eee; text-align: left; }

/* Form 修正：統一字體顏色，取消核突藍色 */
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; color: var(--light-gray); margin-bottom: 8px; }
.input-field { 
    width: 100%; height: 50px; padding: 10px 15px; background: #fff; 
    border: 1.5px solid #eee; border-radius: 12px; font-size: 15px; color: var(--text);
    -webkit-appearance: none; appearance: none;
}
.input-field:focus { border-color: var(--light-gray); } /* 變灰唔變藍 */

.people-row { display: flex; gap: 10px; overflow-x: auto; padding: 8px 0; -webkit-overflow-scrolling: touch; }
.person { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 11px; font-weight: 700; border: 2.5px solid transparent; flex-shrink: 0; }
.person.selected { border-color: #3498db; transform: scale(1.1); }

.btn-confirm { background: var(--navy); color: white; width: 100%; padding: 18px; border-radius: 15px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
.btn-cancel { background: none; color: var(--light-gray); width: 100%; padding: 10px; border: none; font-size: 14px; cursor: pointer; }

.itin-item { display: flex; gap: 12px; padding: 14px 0; border-bottom: 1px solid #f8f8f8; }
.itin-time { color: var(--wine); font-weight: 700; font-size: 13px; min-width: 50px; }
.matrix-table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: center; }
.matrix-table th, .matrix-table td { padding: 10px 4px; border: 1px solid #f0f0f0; }
</style>
</head>
<body>

<div class="header"><div class="title">France 2026</div></div>
<div class="tabs">
    <div id="tab-itinerary" class="tab active" onclick="showTab('itinerary')">Itinerary</div>
    <div id="tab-expenses" class="tab" onclick="showTab('expenses')">Expenses</div>
</div>

<div id="itinerary-page"><div id="itinerary-list"></div></div>
<div id="expenses-page" style="display:none;"><div id="expenses-content"></div></div>

<script>
let SCRIPT_URL = "https://script.google.com/macros/s/AKfycby197Wu8ZbvibClK36DiXXIpYvf2fxSCQcF2szHffwMY4Ov-AjgX9BGK42z-qk7WDJ9lA/exec";
let peopleColors = { C:"#E75480", T:"#00b894", B:"#fdcb6e", G:"#e17055", J:"#d63031", K:"#0984e3", S:"#6ab04c" };
let expenses = [];
let paid = "", shared = [];

// 解決日期偏差與時間亂碼問題
function parseDateStr(str) {
    if (!str) return null;
    let s = str.toString().split('T')[0].replace(/-/g, '/');
    let d = new Date(s);
    return isNaN(d.getTime()) || d.getFullYear() < 1970 ? null : d;
}

function fmtD(raw) {
    let d = parseDateStr(raw);
    if (!d) return "TBD";
    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    return months[d.getMonth()] + " " + d.getDate();
}

function fmtN(num) { return parseFloat(num || 0).toLocaleString('en-US'); }

async function fetchData(sheet) {
    let cacheKey = `cache_v3_${sheet}`;
    let timeKey = `time_v3_${sheet}`;
    let lastTime = localStorage.getItem(timeKey) || "0";
    try {
        const res = await fetch(`${SCRIPT_URL}?sheet=${sheet}&lastUpdate=${lastTime}`);
        const result = await res.json();
        if (result.noUpdate) return JSON.parse(localStorage.getItem(cacheKey));
        localStorage.setItem(cacheKey, JSON.stringify(result));
        localStorage.setItem(timeKey, Date.now());
        return result;
    } catch(e) { return JSON.parse(localStorage.getItem(cacheKey)) || []; }
}

function showTab(t) {
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-'+t).classList.add('active');
    document.getElementById('itinerary-page').style.display = (t==='itinerary'?'block':'none');
    document.getElementById('expenses-page').style.display = (t==='expenses'?'block':'none');
    if(t==='itinerary') renderItin(); else renderExpView();
}

function toggleDate(id) { document.getElementById('cont-'+id).classList.toggle('open'); }

// ITINERARY
async function renderItin() {
    const data = await fetchData('Itinerary');
    const grouped = data.reduce((acc, obj) => {
        let d = fmtD(obj.Date);
        if (d === "TBD") return acc;
        if (!acc[d]) acc[d] = [];
        acc[d].push(obj);
        return acc;
    }, {});

    let html = ""; let idx = 0;
    for(let date in grouped) {
        html += `<div class="date-header" onclick="toggleDate('it${idx}')">${date}</div>
                 <div class="date-content" id="cont-it${idx}">
                    <div class="card">${grouped[date].map(item => {
                        let timeStr = item.Time ? item.Time.toString() : "";
                        let displayTime = timeStr.includes('T') ? timeStr.split('T')[1].substring(0,5) : (timeStr || '--:--');
                        return `
                        <div class="itin-item">
                            <div class="itin-time">${displayTime}</div>
                            <div style="flex:1;">
                                <div style="font-size:15px; font-weight:600;">${item.Activity}</div>
                                <div style="font-size:12px; color:#666; margin:4px 0;">📍 ${item.Location || ''}</div>
                                <div class="people-row">${(item.People||'').split(',').map(p=>p.trim().toUpperCase()).filter(p=>peopleColors[p]).map(p=>`<div class="person" style="background:${peopleColors[p]}; width:20px; height:20px; font-size:8px;">${p}</div>`).join('')}</div>
                            </div>
                        </div>`;
                    }).join('')}</div>
                 </div>`;
        idx++;
    }
    document.getElementById("itinerary-list").innerHTML = html;
}

// EXPENSES
async function renderExpView() {
    const data = await fetchData('Expenses');
    expenses = data.map((row, i) => {
        let fullItem = row.Category || row.Item || "";
        return {
            id: i, date: fmtD(row.Date), 
            cat: fullItem.split(':')[0].trim(),
            desc: fullItem.includes(':') ? fullItem.split(':')[1].trim() : fullItem,
            amount: parseFloat(row.Amount || 0), currency: row.Currency || "HKD", 
            paid: (row.PaidBy || "").toString().trim().toUpperCase(),
            shared: (row.SharedWith || "").toString().split(',').map(x=>x.trim().toUpperCase()).filter(x => peopleColors[x])
        };
    }).filter(e => e.amount > 0);

    const { net, matrix } = calcMatrix();
    let grouped = expenses.slice().reverse().reduce((acc, e) => { if (!acc[e.date]) acc[e.date] = []; acc[e.date].push(e); return acc; }, {});

    let html = `<div class="card">
        <label style="font-size:13px; font-weight:600; color:var(--light-gray); margin-bottom:12px; display:block;">Balance (HKD)</label>
        <div style="overflow-x:auto;"><table class="matrix-table">
            <tr><th></th>${Object.keys(peopleColors).map(p=>`<th><div class="person" style="background:${peopleColors[p]}; width:24px; height:24px; margin:auto;">${p}</div></th>`).join("")}</tr>
            ${Object.keys(peopleColors).map(p1 => `<tr>
                <td><div class="person" style="background:${peopleColors[p1]}; width:24px; height:24px; margin:auto;">${p1}</div></td>
                ${Object.keys(peopleColors).map(p2 => p1===p2 ? `<td style="font-weight:700; color:${net[p1]>=0?'#27ae60':'#e74c3c'}">${fmtN(net[p1])}</td>` : `<td style="color:#e74c3c">${matrix[p1][p2]>0?'-'+fmtN(matrix[p1][p2]):'-'}</td>`).join("")}
            </tr>`).join("")}
        </table></div>
    </div>
    <button class="btn-confirm" style="width:calc(100% - 30px); margin:10px 15px;" onclick="openAdd()">+ Add Expense</button>`;

    let idx = 0;
    for(let date in grouped) {
        html += `<div class="date-header" onclick="toggleDate('ex${idx}')">${date}</div>
                 <div class="date-content open" id="cont-ex${idx}">${grouped[date].map(e => `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center;" onclick="openAdd(${e.id})">
                        <div><div style="font-weight:600;">${e.cat}: ${e.desc}</div><div style="font-size:11px; color:#999;">${e.paid} paid</div></div>
                        <div style="font-weight:700;">${fmtN(e.amount)} ${e.currency}</div>
                    </div>`).join('')}</div>`;
        idx++;
    }
    document.getElementById("expenses-content").innerHTML = html;
}

function calcMatrix() {
    let net = {}, raw = {};
    Object.keys(peopleColors).forEach(p => { net[p]=0; raw[p]={}; Object.keys(peopleColors).forEach(p2=>raw[p][p2]=0); });
    expenses.forEach(e => {
        let total = e.currency === "EUR" ? e.amount * 8.4 : e.amount;
        if(peopleColors[e.paid] && e.shared.length > 0) {
            let share = total / e.shared.length;
            e.shared.forEach(p => { net[p] -= share; if(p!==e.paid) raw[p][e.paid] += share; });
            net[e.paid] += total;
        }
    });
    return { net, matrix: raw };
}

function openAdd(id = null) {
    let e = (id !== null) ? expenses.find(x => x.id === id) : null;
    paid = e ? e.paid : "";
    shared = e ? [...e.shared] : [];
    
    document.getElementById("expenses-content").innerHTML = `
    <div class="card">
        <h2 style="font-family:'Playfair Display'; margin:0 0 25px 0;">${e?'Amend':'New'} Expense</h2>
        <div style="display:flex; gap:12px; margin-bottom:15px;">
            <div style="flex:1.2;"><div class="form-group"><label>Date</label><input id="f-date" type="date" class="input-field" value="${new Date().toISOString().split('T')[0]}"></div></div>
            <div style="flex:1;"><div class="form-group"><label>Category</label><select id="f-cat" class="input-field">
                ${['Dining','Transport','Hotel','Others'].map(c=>`<option ${e && e.cat===c?'selected':''}>${c}</option>`).join('')}
            </select></div></div>
        </div>
        <div class="form-group"><label>Item Description</label><input id="f-item" class="input-field" value="${e?e.desc:''}"></div>
        <div style="display:flex; gap:12px; margin-bottom:15px;">
            <div style="flex:1;"><div class="form-group"><label>Currency</label><select id="f-curr" class="input-field"><option ${e?.currency==='HKD'?'selected':''}>HKD</option><option ${e?.currency==='EUR'?'selected':''}>EUR</option></select></div></div>
            <div style="flex:2;"><div class="form-group"><label>Amount</label><input id="f-amt" type="number" class="input-field" value="${e?e.amount:''}"></div></div>
        </div>
        <div class="form-group"><label>Paid By</label><div class="people-row">${Object.keys(peopleColors).map(p=>`<div id="p-${p}" class="person ${paid===p?'selected':''}" style="background:${peopleColors[p]}" onclick="selP('${p}')">${p}</div>`).join("")}</div></div>
        <div class="form-group"><label>Shared With</label><div class="people-row">${Object.keys(peopleColors).map(p=>`<div id="s-${p}" class="person ${shared.includes(p)?'selected':''}" style="background:${peopleColors[p]}" onclick="tglS('${p}')">${p}</div>`).join("")}</div></div>
        <button class="btn-confirm" onclick="saveData()">Confirm</button>
        <button class="btn-cancel" onclick="renderExpView()">Cancel</button>
    </div>`;
}

function selP(p) { paid = p; document.querySelectorAll('[id^="p-"]').forEach(el=>el.classList.remove('selected')); document.getElementById('p-'+p).classList.add('selected'); }
function tglS(p) { if(shared.includes(p)) shared=shared.filter(x=>x!==p); else shared.push(p); document.getElementById('s-'+p).classList.toggle('selected'); }

async function saveData() {
    let amt = document.getElementById('f-amt').value;
    if(!amt || !paid || !shared.length) return alert("Fill all details!");
    fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ 
        sheet: "Expenses", action: "add", 
        rowData: [document.getElementById('f-date').value, document.getElementById('f-cat').value + ": " + document.getElementById('f-item').value, document.getElementById('f-curr').value, parseFloat(amt), "", 8.4, paid, shared.join(", ")] 
    })});
    showTab('expenses');
}
window.onload = () => showTab('itinerary');
</script>
</body>
</html>
