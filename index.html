<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root { --navy: #1a2a3a; --wine: #8e2121; --bg: #f8f9fa; --text: #333; }
* { box-sizing: border-box; font-family: 'Inter', sans-serif; }
body { background: var(--bg); margin: 0; color: var(--text); -webkit-font-smoothing: antialiased; }
.header { padding: 30px 20px; background: var(--navy); color: white; text-align: center; border-radius: 0 0 25px 25px; }
.title { font-family: 'Playfair Display', serif; font-size: 26px; letter-spacing: 1px; }

.tabs { display: flex; margin: -20px 25px 15px; background: white; padding: 5px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); position: relative; z-index: 10; }
.tab { flex: 1; text-align: center; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 600; color: #999; cursor: pointer; }
.tab.active { background: var(--navy); color: white; }

/* 日期摺疊樣式 */
.date-header { background: white; padding: 15px 20px; margin: 10px 15px; border-radius: 12px; font-weight: 700; color: var(--navy); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; }
.date-header::after { content: '▼'; font-size: 10px; color: #ccc; transition: 0.3s; }
.date-header.open::after { transform: rotate(180deg); }
.date-content { display: none; }
.date-content.open { display: block; }

.card { background: white; border-radius: 15px; padding: 15px; margin: 5px 15px 10px; border: 1px solid #eee; }

/* Form 視覺統一修正 */
.form-group { margin-bottom: 15px; }
.form-group label { display: block; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; text-transform: none; } /* 確保無大階 */
.input-field { width: 100%; height: 48px; padding: 10px 15px; background: #fff; border: 1.5px solid #eee; border-radius: 10px; font-size: 15px; color: var(--text); outline: none; -webkit-appearance: none; }
.input-field:focus { border-color: var(--navy); }

.people-row { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; }
.person { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: 700; border: 2.5px solid transparent; flex-shrink: 0; }
.person.selected { border-color: #3498db; transform: scale(1.1); box-shadow: 0 3px 8px rgba(52,152,219,0.4); }

.btn-save { background: var(--navy); color: white; width: calc(100% - 30px); margin: 10px 15px; padding: 16px; border-radius: 12px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; }
.btn-cancel { background: none; color: #999; width: 100%; padding: 10px; border: none; font-size: 13px; cursor: pointer; }

.itin-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f8f8f8; }
.itin-item:last-child { border-bottom: none; }
.itin-time { color: var(--wine); font-weight: 700; font-size: 13px; min-width: 45px; }

.matrix-table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; }
.matrix-table th, .matrix-table td { padding: 8px 4px; border: 1px solid #f0f0f0; }
</style>
</head>
<body>

<div class="header"><div class="title">France 2026</div></div>
<div class="tabs">
    <div id="tab-itinerary" class="tab active" onclick="showTab('itinerary')">Itinerary</div>
    <div id="tab-expenses" class="tab" onclick="showTab('expenses')">Expenses</div>
</div>

<div id="itinerary-page"><div id="itinerary-list"></div></div>
<div id="expenses-page" style="display:none;"><div id="expenses-content"></div></div>

<script>
let SCRIPT_URL = "https://script.google.com/macros/s/AKfycby197Wu8ZbvibClK36DiXXIpYvf2fxSCQcF2szHffwMY4Ov-AjgX9BGK42z-qk7WDJ9lA/exec";
let people = { C:"#E75480", T:"#00b894", B:"#fdcb6e", G:"#e17055", J:"#d63031", K:"#0984e3", S:"#6ab04c" };
let expenses = [];
let paid = "", shared = [];

// 格式化為 "April 2"
function fmtD(raw) {
    if (!raw) return "TBD";
    let d = new Date(raw.toString().split('T')[0]);
    if (isNaN(d.getTime())) return raw;
    if (d.getFullYear() < 2020) d.setFullYear(2026); 
    return new Intl.DateTimeFormat('en-US', { month: 'long', day: 'numeric' }).format(d);
}

function showTab(t) {
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-'+t).classList.add('active');
    document.getElementById('itinerary-page').style.display = (t==='itinerary'?'block':'none');
    document.getElementById('expenses-page').style.display = (t==='expenses'?'block':'none');
    if(t==='itinerary') refreshItin(); else fetchExp();
}

function toggleDate(id) {
    document.getElementById('head-'+id).classList.toggle('open');
    document.getElementById('cont-'+id).classList.toggle('open');
}

// ITINERARY
async function refreshItin() {
    try {
        const res = await fetch(`${SCRIPT_URL}?sheet=Itinerary`);
        const data = await res.json();
        const grouped = data.reduce((acc, obj) => {
            let d = fmtD(obj.Date);
            if (!acc[d]) acc[d] = [];
            acc[d].push(obj);
            return acc;
        }, {});

        let html = "";
        let idx = 0;
        for(let date in grouped) {
            html += `
            <div class="date-section">
                <div class="date-header" id="head-it${idx}" onclick="toggleDate('it${idx}')">${date}</div>
                <div class="date-content" id="cont-it${idx}">
                    <div class="card">
                        ${grouped[date].map(item => {
                            let pList = item.People ? item.People.split(',').map(x=>x.trim().toUpperCase()) : [];
                            return `
                            <div class="itin-item">
                                <div class="itin-time">${item.Time || '--:--'}</div>
                                <div style="flex:1;">
                                    <div style="font-size:15px; font-weight:600;">${item.Activity}</div>
                                    <div style="font-size:12px; color:#666; margin:4px 0;">📍 ${item.Location || ''}</div>
                                    <div class="people-row">
                                        ${pList.map(p => people[p] ? `<div class="person" style="background:${people[p]}; width:20px; height:20px; font-size:8px;">${p}</div>` : '').join('')}
                                    </div>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>
            </div>`;
            idx++;
        }
        document.getElementById("itinerary-list").innerHTML = html;
    } catch(e) {}
}

// EXPENSES
async function fetchExp() {
    try {
        const res = await fetch(`${SCRIPT_URL}?sheet=Expenses`);
        const data = await res.json();
        expenses = data.map((row, i) => {
            const getV = (ks) => { 
                let key = Object.keys(row).find(x => ks.some(pk => x.replace(/\s/g,'').toLowerCase() === pk.toLowerCase()));
                return key ? row[key] : "";
            };
            let sRaw = getV(["SharedWith", "SharedBy", "Shared"]);
            let sArr = Array.isArray(sRaw) ? sRaw : sRaw.toString().split(',').map(x=>x.trim().toUpperCase());
            return {
                id: i, date: fmtD(getV(["Date"])), item: getV(["Category", "Item"]), 
                amount: parseFloat(getV(["Amount"]) || 0), currency: getV(["Currency"]) || "HKD", 
                paid: getV(["PaidBy", "Payer", "Paid"]).toString().trim().toUpperCase(),
                shared: sArr.filter(x => people[x])
            };
        }).filter(e => e.paid && e.amount > 0);
        renderExpenses();
    } catch(e) {}
}

function renderExpenses() {
    const { net, matrix } = calcMatrix();
    let grouped = expenses.slice().reverse().reduce((acc, e) => {
        if (!acc[e.date]) acc[e.date] = [];
        acc[e.date].push(e);
        return acc;
    }, {});

    let html = `<div class="card">
        <label style="font-size:14px; font-weight:600; margin-bottom:10px; display:block;">Balance (HKD)</label>
        <div style="overflow-x:auto;"><table class="matrix-table">
            <tr><th></th>${Object.keys(people).map(p=>`<th><div class="person" style="background:${people[p]}; width:22px; height:22px; margin:auto;">${p}</div></th>`).join("")}</tr>
            ${Object.keys(people).map(p1 => `<tr>
                <td><div class="person" style="background:${people[p1]}; width:22px; height:22px; margin:auto;">${p1}</div></td>
                ${Object.keys(people).map(p2 => {
                    if(p1===p2) return `<td style="font-weight:700; color:${net[p1]>=0?'#27ae60':'#e74c3c'}">${net[p1].toFixed(0)}</td>`;
                    return `<td style="color:#e74c3c">${matrix[p1][p2]>0?'-'+matrix[p1][p2].toFixed(0):'-'}</td>`;
                }).join("")}
            </tr>`).join("")}
        </table></div>
    </div>
    <button class="btn-save" onclick="openAdd()">+ Add Expense</button>`;

    let idx = 0;
    for(let date in grouped) {
        html += `<div class="date-header" id="head-ex${idx}" onclick="toggleDate('ex${idx}')">${date}</div>
                 <div class="date-content open" id="cont-ex${idx}">${grouped[date].map(e => `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center;" onclick="openAdd(${e.id})">
                        <div><div style="font-weight:600;">${e.item}</div><div style="font-size:11px; color:#999;">${e.paid} paid</div></div>
                        <div style="font-weight:700;">${e.amount} ${e.currency}</div>
                    </div>`).join('')}</div>`;
        idx++;
    }
    document.getElementById("expenses-content").innerHTML = html;
}

function calcMatrix() {
    let net = {}, raw = {};
    Object.keys(people).forEach(p => { net[p]=0; raw[p]={}; Object.keys(people).forEach(p2=>raw[p][p2]=0); });
    expenses.forEach(e => {
        let total = e.currency === "EUR" ? e.amount * 8.4 : e.amount;
        if(people[e.paid] && e.shared.length > 0) {
            let share = total / e.shared.length;
            e.shared.forEach(p => { net[p] -= share; if(p!==e.paid) raw[p][e.paid] += share; });
            net[e.paid] += total;
        }
    });
    return { net, matrix: raw };
}

function openAdd(id = null) {
    let e = (id !== null) ? expenses.find(x => x.id === id) : null;
    paid = e ? e.paid : "";
    shared = e ? [...e.shared] : [];
    document.getElementById("expenses-content").innerHTML = `
    <div class="card">
        <h2 style="font-family:'Playfair Display'; margin:0 0 20px 0;">${e?'Edit':'New'} Expense</h2>
        <div style="display:flex; gap:12px;">
            <div style="flex:1;"><div class="form-group"><label>Date</label><input id="f-date" type="date" class="input-field" value="${new Date().toISOString().split('T')[0]}"></div></div>
            <div style="flex:1;"><div class="form-group"><label>Category</label><select id="f-cat" class="input-field"><option>Dining</option><option>Transport</option><option>Hotel</option><option>Others</option></select></div></div>
        </div>
        <div class="form-group"><label>Item Description</label><input id="f-item" class="input-field" placeholder="e.g. Lunch" value="${e?e.item:''}"></div>
        <div style="display:flex; gap:12px;">
            <div style="flex:1;"><div class="form-group"><label>Currency</label><select id="f-curr" class="input-field"><option>HKD</option><option>EUR</option></select></div></div>
            <div style="flex:2;"><div class="form-group"><label>Amount</label><input id="f-amt" type="number" class="input-field" value="${e?e.amount:''}"></div></div>
        </div>
        <div class="form-group"><label>Paid By</label><div class="people-row">${Object.keys(people).map(p=>`<div id="p-${p}" class="person ${paid===p?'selected':''}" style="background:${people[p]}" onclick="selP('${p}')">${p}</div>`).join("")}</div></div>
        <div class="form-group"><label>Shared With</label><div class="people-row">${Object.keys(people).map(p=>`<div id="s-${p}" class="person ${shared.includes(p)?'selected':''}" style="background:${people[p]}" onclick="tglS('${p}')">${p}</div>`).join("")}</div></div>
        <button class="btn-save" style="width:100%; margin:10px 0;" onclick="saveData()">Confirm</button>
        <button class="btn-cancel" onclick="showTab('expenses')">Cancel</button>
    </div>`;
}

function selP(p) { paid = p; document.querySelectorAll('[id^="p-"]').forEach(el=>el.classList.remove('selected')); document.getElementById('p-'+p).classList.add('selected'); }
function tglS(p) { if(shared.includes(p)) shared=shared.filter(x=>x!==p); else shared.push(p); document.getElementById('s-'+p).classList.toggle('selected'); }

async function saveData() {
    let amt = document.getElementById('f-amt').value;
    if(!amt || !paid || !shared.length) return alert("Fill all info!");
    showTab('expenses');
    fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ 
        sheet: "Expenses", action: "add", 
        rowData: [document.getElementById('f-date').value, document.getElementById('f-cat').value + ": " + document.getElementById('f-item').value, document.getElementById('f-curr').value, parseFloat(amt), "", 8.4, paid, shared.join(", ")] 
    })});
}
window.onload = () => showTab('itinerary');
</script>
</body>
</html>
